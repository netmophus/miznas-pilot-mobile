<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" width="520" height="80">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B4C9B"/>
      <stop offset="100%" stop-color="#1E3A7A"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#C5A135"/>
      <stop offset="100%" stop-color="#E8C84B"/>
    </linearGradient>
  </defs>

  <!-- Icon: Rounded square -->
  <rect x="2" y="10" width="58" height="58" rx="14" ry="14" fill="url(#iconBg)"/>

  <!-- M letter inside icon -->
  <text x="17" y="54" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF" letter-spacing="-1">M</text>

  <!-- Arrow going up-right (yellow/gold) -->
  <line x1="38" y1="42" x2="50" y2="22" stroke="url(#arrow)" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="44,21 51,21 51,28" fill="none" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Miznas text - white bold -->
  <text x="72" y="46" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Miznas</text>

  <!-- Banking text - gold bold italic -->
  <text x="210" y="46" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="32" font-weight="700" font-style="italic" fill="#D4A843" letter-spacing="0.5">Banking</text>

  <!-- Subtitle -->
  <text x="73" y="66" font-family="'Segoe UI', Arial, Helvetica, sans-serif" font-size="11.5" fill="#8B9DC3" letter-spacing="2.2" font-weight="400">L'IA AU SERVICE DE LA DÉCISION BANCAIRE</text>
</svg>
